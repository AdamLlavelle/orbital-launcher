<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Orbital — Game Logs</title>
  <style>
    :root {
      --bg: #0b0e14;
      --bg-raised: #121722;
      --bg-hover: #1a2130;
      --border: #222a3a;
      --text: #e8ecf4;
      --muted: #8b93a7;
      --accent: #4f8cff;
      --green: #3fb950;
      --red: #e5534b;
      --yellow: #d9a03f;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, sans-serif;
      font-size: 13px;
      user-select: none;
      display: flex;
      flex-direction: column;
    }

    .bar {
      display: flex;
      align-items: center;
      height: 40px;
      padding-left: 14px;
      background: var(--bg-raised);
      border-bottom: 1px solid var(--border);
      -webkit-app-region: drag;
      flex: none;
    }
    .bar .title { font-weight: 600; font-size: 13px; }
    .bar .title span { color: var(--muted); font-weight: 400; }
    .state {
      margin-left: 12px;
      font-size: 10.5px;
      font-weight: 600;
      padding: 2px 9px;
      border-radius: 20px;
      background: rgba(79, 140, 255, 0.15);
      color: var(--accent);
    }
    .state.running { background: rgba(63, 185, 80, 0.15); color: var(--green); }
    .state.crashed { background: rgba(229, 83, 75, 0.15); color: var(--red); }
    .state.exited { background: var(--bg-hover); color: var(--muted); }
    .bar .spacer { flex: 1; }
    .win-controls { display: flex; align-items: center; gap: 4px; height: 100%; padding: 0 8px 0 4px; -webkit-app-region: no-drag; }
    .win-controls button {
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      border: none; border-radius: 8px;
      background: transparent; color: var(--muted); cursor: pointer;
    }
    .win-controls button svg { width: 12px; height: 12px; display: block; }
    .win-controls button:hover { background: var(--bg-hover); color: var(--text); }
    .win-controls button.close:hover { background: rgba(229, 83, 75, 0.92); color: #fff; }

    .stats {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 8px 14px;
      background: var(--bg-raised);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
      flex: none;
    }
    .stats b { color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }
    .stats .spacer { flex: 1; }
    .stats button, .stats label {
      -webkit-app-region: no-drag;
      font-size: 11.5px;
      color: var(--muted);
    }
    .stats button {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      color: var(--text);
      cursor: pointer;
    }
    .stats button:hover { background: var(--bg-hover); }
    .stats label { display: flex; align-items: center; gap: 6px; cursor: pointer; }

    #log-pane {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px;
      font-family: Consolas, "Cascadia Mono", monospace;
      font-size: 12px;
      line-height: 1.5;
      user-select: text;
    }
    #log-pane .line { white-space: pre-wrap; word-break: break-all; color: #b9c2d4; }
    #log-pane .line.warn { color: var(--yellow); }
    #log-pane .line.err { color: var(--red); }
    #log-pane .line.mlc { color: var(--muted); }

    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
  </style>
</head>
<body>
  <div class="bar">
    <div class="title">Game Logs <span>— Orbital</span></div>
    <span id="state" class="state">Launching</span>
    <div class="spacer"></div>
    <div class="win-controls">
      <button id="btn-min" title="Minimize">
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><line x1="2" y1="6" x2="10" y2="6"/></svg>
      </button>
      <button id="btn-close" class="close" title="Close">
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><line x1="2.5" y1="2.5" x2="9.5" y2="9.5"/><line x1="9.5" y1="2.5" x2="2.5" y2="9.5"/></svg>
      </button>
    </div>
  </div>

  <div class="stats">
    <span>CPU <b id="stat-cpu">—</b></span>
    <span>RAM <b id="stat-ram">—</b></span>
    <div class="spacer"></div>
    <label><input type="checkbox" id="chk-scroll" checked /> Auto-scroll</label>
    <button id="btn-copy">Copy</button>
    <button id="btn-clear">Clear</button>
  </div>

  <div id="log-pane"></div>

  <script src="logs.js"></script>
</body>
</html>
